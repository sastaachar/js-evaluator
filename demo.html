<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Evaluator — Demo Host</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #58a6ff;
    }

    .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1f2937;
      color: #6b7280;
    }

    .status.ready {
      background: #064e3b;
      color: #34d399;
    }

    .spacer { flex: 1; }

    .mode-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1c2129;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .mode-badge.module {
      background: #1a1b3a;
      color: #a78bfa;
      border-color: #4c3a8a;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editor-panel {
      border-right: 1px solid #21262d;
    }

    textarea {
      flex: 1;
      background: #161b22;
      color: #c9d1d9;
      border: none;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    textarea::placeholder { color: #484f58; }

    .actions {
      padding: 12px 16px;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #30363d; }

    button.primary {
      background: #238636;
      border-color: #2ea043;
      color: #fff;
      font-weight: 600;
    }

    button.primary:hover { background: #2ea043; }

    select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .log-entry {
      padding: 4px 16px;
      border-bottom: 1px solid #161b22;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-entry.warn { color: #d29922; background: rgba(210, 153, 34, 0.05); }
    .log-entry.error { color: #f85149; background: rgba(248, 81, 73, 0.05); }
    .log-entry.info { color: #58a6ff; }
    .log-entry.debug { color: #8b949e; }
    .log-entry.result { color: #7ee787; border-left: 3px solid #238636; }
    .log-entry.system { color: #6e7681; font-style: italic; }
    .log-entry.exec-error { color: #f85149; border-left: 3px solid #da3633; }

    .log-entry .timestamp {
      color: #484f58;
      margin-right: 8px;
      font-size: 11px;
    }

    iframe { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>JS Evaluator</h1>
    <span class="status" id="status">Connecting…</span>
    <span class="spacer"></span>
    <span class="mode-badge" id="mode-badge">Script</span>
  </header>

  <main>
    <div class="panel editor-panel">
      <div class="panel-header">
        <span>Code</span>
        <select id="examples">
          <option value="">Examples…</option>
          <option value="basic">Basic console</option>
          <option value="module-cdn">Import from CDN</option>
          <option value="module-importmap">Import map</option>
          <option value="top-level-await">Top-level await</option>
          <option value="ts-rest-sdk">ThoughtSpot REST SDK</option>
        </select>
      </div>
      <textarea id="code" placeholder="Write JavaScript here…" spellcheck="false">console.log("Hello from the evaluator!");

const nums = [1, 2, 3, 4, 5];
console.log("Sum:", nums.reduce((a, b) => a + b, 0));

console.warn("This is a warning");
console.error("This is an error");

return { status: "done", items: nums.length };</textarea>
      <div class="actions">
        <button class="primary" id="run-btn">Run ▶</button>
        <button id="clear-btn">Clear Output</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span>Output</span>
        <span id="entry-count"></span>
      </div>
      <div id="output"></div>
    </div>
  </main>

  <iframe id="sandbox" sandbox="allow-scripts allow-same-origin" src="index.html"></iframe>

  <script>
    const sandbox = document.getElementById("sandbox");
    const output = document.getElementById("output");
    const codeEl = document.getElementById("code");
    const statusEl = document.getElementById("status");
    const runBtn = document.getElementById("run-btn");
    const clearBtn = document.getElementById("clear-btn");
    const entryCount = document.getElementById("entry-count");
    const modeBadge = document.getElementById("mode-badge");
    const examplesEl = document.getElementById("examples");

    let entries = 0;

    const EXAMPLES = {
      basic:
`console.log("Hello from the evaluator!");

const nums = [1, 2, 3, 4, 5];
console.log("Sum:", nums.reduce((a, b) => a + b, 0));

console.warn("This is a warning");
console.error("This is an error");

return { status: "done", items: nums.length };`,

      "module-cdn":
`import confetti from "https://esm.sh/canvas-confetti";

console.log("Firing confetti!");
confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

console.log("Done!");`,

      "module-importmap":
`// First, the host sends a set-importmap message (done automatically here).
// Then you can use bare specifiers like "lodash-es":

import { chunk, shuffle, capitalize } from "lodash-es";

const words = ["hello", "world", "from", "evaluator"];
console.log("Capitalized:", words.map(capitalize));
console.log("Shuffled:", shuffle(words));
console.log("Chunked:", chunk([1, 2, 3, 4, 5, 6], 2));`,

      "top-level-await":
`const resp = await fetch("https://jsonplaceholder.typicode.com/todos/1");
const todo = await resp.json();
console.log("Fetched todo:", todo);

const resp2 = await fetch("https://jsonplaceholder.typicode.com/users/1");
const user = await resp2.json();
console.log("User:", user.name, "-", user.email);`,

      "ts-rest-sdk":
`import { createConfiguration, ThoughtSpotRestApi } from "https://esm.sh/@thoughtspot/rest-api-sdk";

const config = createConfiguration({
  baseServer: { url: "https://my-ts-instance.thoughtspot.cloud" },
});

console.log("Config created:", config);
console.log("ThoughtSpotRestApi:", typeof ThoughtSpotRestApi);

const client = new ThoughtSpotRestApi(config);
console.log("Client methods:", Object.getOwnPropertyNames(Object.getPrototypeOf(client)).filter(m => m !== "constructor").slice(0, 10));`
    };

    const IMPORTMAPS = {
      "module-importmap": {
        imports: {
          "lodash-es": "https://esm.sh/lodash-es",
          "lodash-es/": "https://esm.sh/lodash-es/"
        }
      }
    };

    const MODULE_PATTERN =
      /(^|\n)\s*(import\s+[\w{*]|import\s*\(|import\s+["']|export\s+[\w{*]|export\s+default)/;

    function detectMode(code) {
      const stripped = code
        .replace(/\/\*[\s\S]*?\*\//g, "")
        .replace(/\/\/.*$/gm, "")
        .replace(/(["'`])(?:(?!\1|\\).|\\.)*\1/g, '""');
      return MODULE_PATTERN.test(stripped) ? "module" : "script";
    }

    function updateModeBadge() {
      const mode = detectMode(codeEl.value);
      modeBadge.textContent = mode === "module" ? "Module" : "Script";
      modeBadge.className = "mode-badge" + (mode === "module" ? " module" : "");
    }

    codeEl.addEventListener("input", updateModeBadge);

    examplesEl.addEventListener("change", function () {
      const key = this.value;
      if (key && EXAMPLES[key]) {
        codeEl.value = EXAMPLES[key];
        updateModeBadge();
      }
      this.value = "";
    });

    function ts(timestamp) {
      return new Date(timestamp).toLocaleTimeString("en-US", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        fractionalSecondDigits: 3,
      });
    }

    function appendEntry(className, text, timestamp) {
      const div = document.createElement("div");
      div.className = "log-entry " + className;
      const time = document.createElement("span");
      time.className = "timestamp";
      time.textContent = ts(timestamp);
      div.appendChild(time);
      div.appendChild(document.createTextNode(text));
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
      entries++;
      entryCount.textContent = entries + " entries";
    }

    function formatArgs(args) {
      return args.map(a => a.value).join(" ");
    }

    window.addEventListener("message", function (event) {
      const msg = event.data;
      if (!msg || typeof msg !== "object") return;

      switch (msg.type) {
        case "ready":
          statusEl.textContent = "Ready";
          statusEl.classList.add("ready");
          break;

        case "console":
          if (msg.level === "clear") {
            output.innerHTML = "";
            entries = 0;
            entryCount.textContent = "";
          } else {
            appendEntry(msg.level, formatArgs(msg.args), msg.timestamp);
          }
          break;

        case "execution-start":
          appendEntry("system", "— Execution started —", msg.timestamp);
          break;

        case "execution-result":
          if (msg.result && msg.result.type !== "undefined") {
            appendEntry("result", "↪ " + msg.result.value, msg.timestamp);
          }
          break;

        case "execution-error":
          appendEntry("exec-error", msg.error.name + ": " + msg.error.message, msg.timestamp);
          break;

        case "execution-end":
          appendEntry("system", "— Execution finished —", msg.timestamp);
          break;

        case "runtime-error":
          appendEntry("exec-error", msg.error.message, msg.timestamp);
          break;

        case "importmap-set":
          appendEntry("system", "— Import map configured —", msg.timestamp);
          break;
      }
    });

    function sendImportMapIfNeeded() {
      for (const [key, map] of Object.entries(IMPORTMAPS)) {
        if (codeEl.value === EXAMPLES[key]) {
          sandbox.contentWindow.postMessage({ type: "set-importmap", map }, "*");
          return;
        }
      }
    }

    runBtn.addEventListener("click", function () {
      sendImportMapIfNeeded();
      sandbox.contentWindow.postMessage(
        { type: "execute", code: codeEl.value },
        "*"
      );
    });

    clearBtn.addEventListener("click", function () {
      output.innerHTML = "";
      entries = 0;
      entryCount.textContent = "";
    });

    codeEl.addEventListener("keydown", function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        runBtn.click();
      }
      if (e.key === "Tab") {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    });
  </script>
</body>
</html>
